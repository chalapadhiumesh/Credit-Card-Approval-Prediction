<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>💳 Credit Card Approval Assessment</h2>
        <form action="/predict" method="POST">
            <div class="form-group">
                <label>Gender:</label>
                <select name="gender" required>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Owns a Car?</label>
                <select name="car" required>
                    <option value="Y">Yes</option>
                    <option value="N">No</option>
                </select>
            </div>
            <div class="form-group">
                <label>Owns Property/Realty?</label>
                <select name="realty" required>
                    <option value="Y">Yes</option>
                    <option value="N">No</option>
                </select>
            </div>
            <div class="form-group">
                <label>Total Annual Income ($):</label>
                <input type="number" name="income" placeholder="e.g. 50000" required>
            </div>
            <div class="form-group">
                <label>Income Type:</label>
                <select name="income_type" required>
                    <option value="Working">Working</option>
                    <option value="Commercial associate">Commercial Associate</option>
                    <option value="State servant">State Servant</option>
                    <option value="Pensioner">Pensioner</option>
                </select>
            </div>
            <div class="form-group">
                <label>Education level:</label>
                <select name="education" required>
                    <option value="Higher education">Higher Education</option>
                    <option value="Secondary / secondary special">Secondary Special</option>
                    <option value="Incomplete higher">Incomplete Higher</option>
                </select>
            </div>
            <div class="form-group">
                <label>Family Status:</label>
                <select name="family_status" required>
                    <option value="Married">Married</option>
                    <option value="Single / not married">Single</option>
                    <option value="Civil marriage">Civil Marriage</option>
                </select>
            </div>
            <div class="form-group">
                <label>Housing Type:</label>
                <select name="housing_type" required>
                    <option value="House / apartment">House / Apartment</option>
                    <option value="Rented apartment">Rented Apartment</option>
                    <option value="With parents">With Parents</option>
                </select>
            </div>
            <div class="form-group">
                <label>Age (Years):</label>
                <input type="number" name="age" placeholder="e.g. 30" required>
            </div>
            <div class="form-group">
                <label>Work Experience (Years):</label>
                <input type="number" name="experience" placeholder="e.g. 5" required>
            </div>
            <div class="form-group">
                <label>Children Count:</label>
                <input type="number" name="children" value="0" required>
            </div>
            <div class="form-group">
                <label>Total Family Members:</label>
                <input type="number" name="family_size" value="1" required>
            </div>
            <div class="form-group">
                <label>Has Work Phone?</label>
                <select name="work_phone"><option value="1">Yes</option><option value="0">No</option></select>
            </div>
            <div class="form-group">
                <label>Has Personal Phone?</label>
                <select name="phone"><option value="1">Yes</option><option value="0">No</option></select>
            </div>
            <div class="form-group">
                <label>Has Email?</label>
                <select name="email"><option value="1">Yes</option><option value="0">No</option></select>
            </div>
            <div class="form-group">
                <label>Occupation Type:</label>
                <select name="occupation">
                    <option value="Laborers">Laborers</option>
                    <option value="Core staff">Core Staff</option>
                    <option value="Sales staff">Sales Staff</option>
                    <option value="Managers">Managers</option>
                </select>
            </div>
            <button type="submit" class="btn">Evaluate Approval Status</button>
        </form>

        {% if prediction_text %}
            <div class="result {{ result_style }}">
                <h3>{{ prediction_text }}</h3>
            </div>
        {% endif %}
    </div>
</body>
</html>
